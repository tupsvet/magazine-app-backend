ktor {
    deployment {
        port = 8080
        port = ${?SERVER_PORT}
    }
    application {
        modules = [ com.magazines.ApplicationKt.module ]
    }
}

server {
    baseUrl = "http://localhost:8080"
    baseUrl = ${?SERVER_BASE_URL}
}

database {
    url = "jdbc:postgresql://localhost:5432/magazines_catalog"
    url = ${?DATABASE_URL}
    user = "app"
    user = ${?DATABASE_USER}
    password = "app_password"
    password = ${?DATABASE_PASSWORD}
}

storage {
    path = "./storage"
    path = ${?STORAGE_PATH}
}

jwt {
    secret = "dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "magazines-catalog"
    issuer = ${?JWT_ISSUER}
    audience = "magazines-catalog-clients"
    audience = ${?JWT_AUDIENCE}
    realm = "Magazines Catalog API"
    realm = ${?JWT_REALM}
}
